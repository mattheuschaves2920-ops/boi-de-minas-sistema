{% extends "base.html" %}

{% block content %}

<div class="grid">

    <section
        class="card"

        style="
            max-width:750px;
            margin:auto;

            border-top:5px solid var(--green);
        "
    >

        <!-- TOPO -->

        <div
            style="
                display:flex;
                justify-content:space-between;
                align-items:center;
                gap:10px;
                flex-wrap:wrap;

                margin-bottom:22px;
            "
        >

            <div>

                <h2 style="margin:0;">

                    🛒 Nova Venda

                </h2>

                <p
                    class="muted"
                    style="margin-top:5px;"
                >

                    Registre uma nova venda no sistema.

                </p>

            </div>

            <div
                class="badge success"
                style="
                    padding:8px 12px;
                    font-size:12px;
                "
            >

                💰 Financeiro

            </div>

        </div>

        <!-- ALERTAS -->

        {% if error %}

        <div
            class="alert alert-error"
            style="margin-bottom:18px;"
        >

            ⚠️ {{ error }}

        </div>

        {% endif %}

        {% if success %}

        <div
            class="alert alert-success"
            style="margin-bottom:18px;"
        >

            ✅ {{ success }}

        </div>

        {% endif %}

        <!-- FORM -->

        <form
            method="POST"
            id="formVenda"
        >

            <!-- CSRF -->

            {% if csrf_token %}

            <input
                type="hidden"
                name="csrf_token"
                value="{{ csrf_token() }}"
            >

            {% endif %}

            <!-- CLIENTE -->

            <label>

                👤 Cliente

                <input
                    type="text"
                    name="cliente"
                    required

                    autocomplete="off"

                    placeholder="Nome do cliente"
                >

            </label>

            <!-- VALOR / PAGAMENTO -->

            <div
                class="grid"
                style="
                    grid-template-columns:1fr 1fr;
                    gap:12px;
                "
            >

                <!-- VALOR -->

                <label>

                    💰 Valor da Venda (R$)

                    <input
                        type="number"

                        step="0.01"

                        min="0.01"

                        name="valor"

                        id="valor"

                        required

                        placeholder="0,00"
                    >

                </label>

                <!-- PAGAMENTO -->

                <label>

                    💳 Forma de Pagamento

                    <select name="pagamento">

                        <option value="Dinheiro">
                            Dinheiro
                        </option>

                        <option value="Pix">
                            Pix
                        </option>

                        <option value="Cartão Crédito">
                            Cartão Crédito
                        </option>

                        <option value="Cartão Débito">
                            Cartão Débito
                        </option>

                        <option value="Delivery">
                            Delivery
                        </option>

                    </select>

                </label>

            </div>

            <!-- DATA / RESPONSÁVEL -->

            <div
                class="grid"
                style="
                    grid-template-columns:1fr 1fr;
                    gap:12px;
                "
            >

                <!-- DATA -->

                <label>

                    📅 Data

                    <input
                        type="date"

                        name="data"

                        value="
                        {{ today.strftime('%Y-%m-%d')
                           if today else '' }}
                        "
                    >

                </label>

                <!-- RESPONSÁVEL -->

                <label>

                    👨‍🍳 Responsável

                    <input
                        type="text"

                        name="responsavel"

                        placeholder="
                        Caixa / Atendente...
                        "
                    >

                </label>

            </div>

            <!-- OBS -->

            <label>

                📝 Observação

                <textarea
                    name="observacao"

                    rows="4"

                    placeholder="
                    Informações adicionais da venda...
                    "
                ></textarea>

            </label>

            <!-- PREVIEW -->

            <div
                class="card metric"

                style="
                    margin-top:20px;

                    border-left:5px solid var(--green);

                    background:#f9fffb;
                "
            >

                <span>

                    💰 Valor informado

                </span>

                <strong
                    id="previewValor"

                    style="
                        color:var(--green);
                        font-size:1.6rem;
                    "
                >

                    R$ 0,00

                </strong>

            </div>

            <!-- BOTÕES -->

            <div
                style="
                    display:flex;
                    gap:10px;
                    margin-top:22px;
                "
            >

                <!-- SALVAR -->

                <button
                    type="submit"

                    class="btn"

                    id="btnSalvar"

                    style="
                        flex:2;

                        background:var(--green);

                        color:#fff;

                        font-weight:700;
                    "
                >

                    💾 Salvar Venda

                </button>

                <!-- VOLTAR -->

                <a

                    href="{{ url_for('vendas') }}"

                    class="btn"

                    style="
                        flex:1;

                        background:#eee;

                        color:var(--ink);

                        text-align:center;
                    "
                >

                    Voltar

                </a>

            </div>

        </form>

    </section>

</div>

<!-- SCRIPT -->

<script>

/* ───────────────────────────── */
/* FORMATAÇÃO */
/* ───────────────────────────── */

function formatMoney(value) {

    return value.toLocaleString(
        'pt-BR',
        {
            style:'currency',
            currency:'BRL'
        }
    );

}

/* ───────────────────────────── */
/* PREVIEW VALOR */
/* ───────────────────────────── */

const valorInput =
    document.getElementById('valor');

const previewValor =
    document.getElementById('previewValor');

if (
    valorInput &&
    previewValor
) {

    valorInput.addEventListener(
        'input',
        () => {

            const valor =

                parseFloat(
                    valorInput.value
                ) || 0;

            previewValor.textContent =

                formatMoney(valor);

        }
    );

}

/* ───────────────────────────── */
/* BOTÃO LOADING */
/* ───────────────────────────── */

const formVenda =
    document.getElementById(
        'formVenda'
    );

if (formVenda) {

    formVenda.addEventListener(
        'submit',
        () => {

            const btn =
                document.getElementById(
                    'btnSalvar'
                );

            if (!btn) return;

            btn.disabled = true;

            btn.innerHTML =
                '⏳ Salvando...';

        }
    );

}

</script>

<!-- BADGES -->

<style>

.badge {

    border-radius:999px;

    font-weight:700;

    text-transform:uppercase;

}

.badge.success {

    background:#dcfce7;

    color:#166534;

}

</style>

{% endblock %}
