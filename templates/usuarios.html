{% extends "base.html" %}
{% block content %}
<div class="grid two">
  <section class="card">
    <h3>Cadastrar usuário</h3>
    <form method="post">
      <label>Nome
        <input type="text" name="name" required>
      </label>
      <label>Usuário
        <input type="text" name="username" required>
      </label>
      <label>Senha
        <input type="password" name="password" required>
      </label>
      <label>Perfil
        <select name="role">{% for role in roles %}<option>{{ role }}</option>{% endfor %}</select>
      </label>
      <button class="btn">Salvar usuário</button>
    </form>
  </section>
  <section class="card">
    <h3>Usuários cadastrados</h3>
    <table>
      <tr><th>Nome</th><th>Usuário</th><th>Perfil</th></tr>
      {% for u in usuarios %}
      <tr><td>{{ u.name }}</td><td>{{ u.username }}</td><td>{{ u.role }}</td></tr>
      {% endfor %}
    </table>
  </section>
</div>
{% endblock %}\n
