{% extends "base.html" %}
{% block content %}

<h2>Produção</h2>

<form method="get">
<label>Filtrar por dia</label>
<input type="date" name="data" value="{{ data_ref.strftime('%Y-%m-%d') }}">
<button type="submit">Filtrar</button>
</form>

<hr>

<h3>Lançar produção</h3>

<form method="post">

<label>Data</label>
<input type="date" name="prod_date" value="{{ data_ref.strftime('%Y-%m-%d') }}" required>

<label>Setor</label>
<select name="setor">
{% for s in setores %}
<option value="{{ s }}">{{ s }}</option>
{% endfor %}
</select>

<label>Item</label>
<select name="item_id">
{% for i in items %}
<option value="{{ i.id }}">{{ i.name }}</option>
{% endfor %}
</select>

<label>Quantidade</label>
<input type="number" step="0.001" name="quantity" required>

<button type="submit">Salvar</button>

</form>

<hr>

<h3>Produção do dia</h3>

<table border="1" width="100%">

<tr>
<th>Data</th>
<th>Setor</th>
<th>Item</th>
<th>Quantidade</th>
<th>Custo</th>
<th>Ações</th>
</tr>

{% for p in lista %}

<tr>

<td>{{ p.prod_date }}</td>
<td>{{ p.setor }}</td>
<td>{{ p.item_name }}</td>
<td>{{ p.quantity }}</td>
<td>R$ {{ "%.2f"|format(p.cost) }}</td>

<td>

<form action="/excluir-producao/{{ p.id }}" method="post" style="display:inline;">
<button type="submit">Excluir</button>
</form>

</td>

</tr>

{% endfor %}

</table>

{% endblock %}
