{% extends "base.html" %}
{% block content %}
<div class="grid two">
  <section class="card">
    <h3>Produção da cozinha</h3>
    <form method="post">
      <label>Data
        <input type="date" name="prod_date" required>
      </label>
      <label>Item
        <select name="item_id">
          {% for i in items %}<option value="{{ i.id }}">{{ i.name }} — {{ i.category }}</option>{% endfor %}
        </select>
      </label>
      <label>Quantidade usada
        <input type="number" step="0.001" name="quantity" required>
      </label>
      <button class="btn">Salvar produção</button>
    </form>
  </section>
  <section class="card">
    <h3>Histórico de produção</h3>
    <div class="table-wrap">
      <table>
        <tr><th>Data</th><th>Item</th><th>Qtd.</th><th>Custo</th></tr>
        {% for p in lista %}
        <tr><td>{{ p.prod_date.strftime('%d/%m/%Y') }}</td><td>{{ p.item_name }}</td><td>{{ p.quantity }}</td><td>R$ {{ '%.2f'|format(p.cost) }}</td></tr>
        {% endfor %}
      </table>
    </div>
  </section>
</div>
<script>document.querySelector('input[name="prod_date"]').value = new Date().toISOString().slice(0,10);</script>
{% endblock %}\n
