{% extends "base.html" %}
{% block content %}

<h2 style="margin-bottom:1.5rem;">🎯 Metas Mensais de Faturamento</h2>

<div class="grid two">
    <section class="card" style="border-top:4px solid var(--gold);">
        <h3 style="margin:0 0 1.25rem;">Definir nova meta</h3>
        <form method="post">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="grid" style="grid-template-columns:1fr 1fr; gap:10px;">
                <label>Ano
                    <input type="number" name="year" value="{{ now().year }}" min="2024" max="2030" required>
                </label>
                <label>Mês (1-12)
                    <input type="number" name="month" value="{{ now().month }}" min="1" max="12" required>
                </label>
            </div>
            <label>Meta de Faturamento (R$)
                <input type="number" step="0.01" name="goal" placeholder="Ex: 50000.00" required>
            </label>
            <button class="btn" type="submit" style="width:100%; margin-top:12px; background:var(--gold); color:#403000;">
                💾 Salvar Meta
            </button>
        </form>
    </section>

    <section class="card">
        <h3 style="margin:0 0 1rem;">Metas cadastradas</h3>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>Período</th>
                        <th style="text-align:right;">Meta (R$)</th>
                    </tr>
                </thead>
                <tbody>
                    {% for m in metas %}
                    <tr>
                        <td><strong>{{ '%02d'|format(m.month) }}/{{ m.year }}</strong></td>
                        <td style="text-align:right;">R$ {{ '%.2f'|format(m.goal) }}</td>
                    </tr>
                    {% else %}
                    <tr><td colspan="2" class="muted" style="text-align:center; padding:20px;">Nenhuma meta definida ainda.</td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </section>
</div>

{% endblock %}
