{% extends "base.html" %}
{% block content %}
<div class="grid two">
    <section class="card" style="border-top: 4px solid var(--gold);">
        <h3>📦 Cadastrar Novo Item</h3>
        <form method="post">
            <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 10px;">
                <label>Área
                    <select name="area">
                        {% for a in areas %}<option value="{{ a }}">{{ a }}</option>{% endfor %}
                    </select>
                </label>
                <label>Código
                    <input type="text" name="code" placeholder="Código de barras">
                </label>
            </div>
            <label>Nome do Produto
                <input type="text" name="name" required>
            </label>
            <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 10px;">
                <label>Unidade
                    <select name="unit">
                        <option value="kg">Kg</option>
                        <option value="un">Un</option>
                        <option value="l">Litro</option>
                    </select>
                </label>
                <label>Custo (R$)
                    <input type="number" step="0.01" name="cost" value="0.00">
                </label>
            </div>
            <button class="btn" type="submit" style="width: 100%; margin-top: 15px;">💾 Salvar</button>
        </form>
    </section>

    <section class="card">
        <h3>🔍 Estoque Atual</h3>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr><th>Item</th><th>Qtd</th><th>Status</th></tr>
                </thead>
                <tbody>
                    {% for i in itens %}
                    <tr>
                        <td>{{ i.name }}</td>
                        <td>{{ i.stock }} {{ i.unit }}</td>
                        <td>{% if i.stock <= i.min_stock %}⚠️{% else %}✅{% endif %}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </section>
</div>
{% endblock %}
