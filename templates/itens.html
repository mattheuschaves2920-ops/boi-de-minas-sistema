{% extends "base.html" %}
{% block content %}
<div class="grid two">
  <section class="card">
    <h3>Cadastrar item</h3>
    <form method="post">
      <label>Área
        <select name="area">{% for a in areas %}<option>{{ a }}</option>{% endfor %}</select>
      </label>
      <label>Código de barras
        <input type="text" name="code">
      </label>
      <label>Nome do item
        <input type="text" name="name" required>
      </label>
      <label>Categoria
        <input type="text" name="category">
      </label>
      <label>Unidade
        <select name="unit"><option>kg</option><option>un</option><option>l</option><option>cx</option><option>pct</option></select>
      </label>
      <label>Custo unitário
        <input type="number" step="0.01" name="cost">
      </label>
      <label>Estoque atual
        <input type="number" step="0.001" name="stock">
      </label>
      <label>Estoque mínimo
        <input type="number" step="0.001" name="min_stock">
      </label>
      <button class="btn">Salvar item</button>
    </form>
  </section>
  <section class="card">
    <h3>Itens cadastrados</h3>
    <div class="table-wrap">
      <table>
        <tr><th>Área</th><th>Item</th><th>Estoque</th><th>Mín.</th><th>Custo</th></tr>
        {% for i in itens %}
        <tr><td>{{ i.area }}</td><td>{{ i.name }}</td><td>{{ i.stock }}</td><td>{{ i.min_stock }}</td><td>R$ {{ '%.2f'|format(i.cost) }}</td></tr>
        {% endfor %}
      </table>
    </div>
  </section>
</div>
{% endblock %}
