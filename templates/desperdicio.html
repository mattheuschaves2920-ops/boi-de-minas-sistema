{% extends "base.html" %}
{% block content %}
<div class="grid two">
  <section class="card">
    <h3>Controle de desperdício</h3>
    <form method="post">
      <label>Data<input type="date" name="waste_date" required></label>
      <label>Item
        <select name="item_id">{% for i in items %}<option value="{{ i.id }}">{{ i.name }} — {{ i.category }}</option>{% endfor %}</select>
      </label>
      <label>Quantidade<input type="number" step="0.001" name="quantity" required></label>
      <label>Motivo<input type="text" name="reason" placeholder="sobra, estragou, erro de produção..."></label>
      <button class="btn">Salvar desperdício</button>
    </form>
  </section>
  <section class="card">
    <h3>Histórico</h3>
    <div class="table-wrap">
      <table>
        <tr><th>Data</th><th>Item</th><th>Qtd.</th><th>Motivo</th><th>Valor</th></tr>
        {% for d in lista %}
        <tr><td>{{ d.waste_date.strftime('%d/%m/%Y') }}</td><td>{{ d.item_name }}</td><td>{{ d.quantity }}</td><td>{{ d.reason }}</td><td>R$ {{ '%.2f'|format(d.value) }}</td></tr>
        {% endfor %}
      </table>
    </div>
  </section>
</div>
<script>document.querySelector('input[name="waste_date"]').value = new Date().toISOString().slice(0,10);</script>
{% endblock %}
