{% extends "base.html" %}

{% block content %}

<style>

.login-container{

    width:100%;
    min-height:80vh;

    display:flex;
    align-items:center;
    justify-content:center;

    padding:40px;
}

.login-card{

    width:100%;
    max-width:420px;

    background:#ffffff;

    border-radius:16px;

    padding:40px;

    box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.login-card h1{

    margin:0 0 10px 0;

    font-size:32px;

    color:#222;
}

.login-card p{

    margin-bottom:30px;

    color:#666;
}

.form-group{

    margin-bottom:20px;
}

.form-group label{

    display:block;

    margin-bottom:8px;

    font-weight:600;

    color:#333;
}

.form-group input{

    width:100%;

    padding:14px;

    border:1px solid #dcdcdc;

    border-radius:10px;

    font-size:16px;
}

.form-group input:focus{

    outline:none;

    border-color:#c62828;
}

.btn{

    width:100%;

    border:none;

    padding:14px;

    border-radius:10px;

    background:#c62828;

    color:white;

    font-size:16px;

    font-weight:bold;

    cursor:pointer;
}

.btn:hover{

    opacity:0.9;
}

.alert{

    background:#ffebee;

    color:#c62828;

    padding:12px;

    border-radius:10px;

    margin-bottom:20px;
}

</style>

<div class="login-container">

    <div class="login-card">

        <h1>
            Sistema Boi de Minas
        </h1>

        <p>
            Faça login para acessar o sistema
        </p>

        {% if error %}

        <div class="alert">
            {{ error }}
        </div>

        {% endif %}

        <form method="POST">

            <div class="form-group">

                <label>
                    Usuário
                </label>

                <input
                    type="text"
                    name="username"
                    required
                >

            </div>

            <div class="form-group">

                <label>
                    Senha
                </label>

                <input
                    type="password"
                    name="password"
                    required
                >

            </div>

            <button
                type="submit"
                class="btn"
            >
                Entrar
            </button>

        </form>

    </div>

</div>

{% endblock %}
