<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or 'Boi de Minas – Ravena' }}</title>
  <meta name="theme-color" content="#8b0000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Boi de Minas">
  <link rel="manifest" href="{{ url_for('static', filename='manifest.webmanifest') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icon-512.png') }}">
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='icon-192.png') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script src="https://unpkg.com/html5-qrcode" defer></script>
</head>
<body>
{% if user %}
<header class="topbar">
  <div class="brand">
    <div class="brand-icon">🍽️</div>
    <div class="brand-text">
      <h1>Boi de Minas – Ravena</h1>
      <p>Sistema online multiusuário</p>
    </div>
  </div>
  <nav>
    <a href="{{ url_for('dashboard') }}">Dashboard</a>
    <a href="{{ url_for('itens') }}">Estoque</a>
    <a href="{{ url_for('vendas') }}">Refeições</a>
    <a href="{{ url_for('movimentos') }}">Movimentos</a>
    <a href="{{ url_for('producao') }}">Produção</a>
    <a href="{{ url_for('desperdicio') }}">Desperdício</a>
    <a href="{{ url_for('controle_diario') }}">Controle diário</a>
    <a href="{{ url_for('relatorios') }}">Relatórios</a>
    {% if user.role == 'admin' %}
    <a href="{{ url_for('usuarios') }}">Usuários</a>
    {% endif %}
    <a href="{{ url_for('logout') }}">Sair</a>
  </nav>
</header>
{% endif %}
<main class="container">
{% block content %}{% endblock %}
</main>
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", function () {
    navigator.serviceWorker.register("/service-worker.js").catch(function(){});
  });
}
</script>
</body>
</html>
