{% extends "base.html" %}
{% block content %}
<div class="grid two">
  <section class="card">
    <h3>Lançar movimentação</h3>
    <div class="barcode-box">
      <button type="button" class="btn" onclick="toggleScanner('scanner-mov')">Ler código de barras</button>
      <div id="scanner-mov" class="scanner hidden"></div>
    </div>
    <form method="post">
      <label>Data<input type="date" name="mov_date" required></label>
      <label>Tipo
        <select name="mov_type"><option>Entrada</option><option>Saida</option><option>Perda</option></select>
      </label>
      <label>Área
        <select name="area">{% for a in areas %}<option>{{ a }}</option>{% endfor %}</select>
      </label>
      <label>Código de barras<input type="text" name="barcode" id="barcode"></label>
      <label>Item
        <select name="item_id" id="item_id">
          <option value="">Selecione</option>
          {% for i in items %}<option value="{{ i.id }}" data-code="{{ i.code or '' }}">{{ i.name }} — {{ i.area }}</option>{% endfor %}
        </select>
      </label>
      <label>Quantidade<input type="number" step="0.001" name="quantity" required></label>
      <label>Custo unitário (só para entrada)<input type="number" step="0.01" name="unit_cost"></label>
      <label>Detalhe<input type="text" name="detail" placeholder="setor, motivo, observação..."></label>
      <button class="btn">Salvar movimentação</button>
    </form>
  </section>
  <section class="card">
    <h3>Histórico</h3>
    <div class="table-wrap">
      <table>
        <tr><th>Data</th><th>Tipo</th><th>Área</th><th>Item</th><th>Qtd.</th><th>Valor</th></tr>
        {% for m in movimentos %}
        <tr><td>{{ m.mov_date.strftime('%d/%m/%Y') }}</td><td>{{ m.mov_type }}</td><td>{{ m.area }}</td><td>{{ m.item_name }}</td><td>{{ m.quantity }}</td><td>R$ {{ '%.2f'|format(m.value) }}</td></tr>
        {% endfor %}
      </table>
    </div>
  </section>
</div>
<script>
document.querySelector('input[name="mov_date"]').value = new Date().toISOString().slice(0,10);
function selecionarPorCodigo(codigo){
  document.getElementById('barcode').value = codigo;
  const select = document.getElementById('item_id');
  for(let i=0;i<select.options.length;i++){
    if(select.options[i].dataset.code === codigo){
      select.value = select.options[i].value;
      break;
    }
  }
}
document.getElementById('barcode').addEventListener('change', e => selecionarPorCodigo(e.target.value));
let activeScanner = null;
function toggleScanner(scannerId){
  const scannerEl = document.getElementById(scannerId);
  if(!scannerEl.classList.contains('hidden')){
    if(activeScanner){ activeScanner.stop().catch(()=>{}); activeScanner = null; }
    scannerEl.innerHTML = '';
    scannerEl.classList.add('hidden');
    return;
  }
  scannerEl.classList.remove('hidden');
  activeScanner = new Html5Qrcode(scannerId);
  activeScanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 220 },
    (decodedText) => {
      selecionarPorCodigo(decodedText);
      activeScanner.stop().then(() => {
        scannerEl.innerHTML = '';
        scannerEl.classList.add('hidden');
      });
    },
    () => {}
  ).catch(() => {
    alert('Não foi possível abrir a câmera.');
    scannerEl.classList.add('hidden');
  });
}
</script>
{% endblock %}
