{% extends "base.html" %}
{% block content %}
<div class="grid two">
  <section class="card">
    <h3>Lançar movimentação</h3>
    <form method="post">
      <label>Data
        <input type="date" name="mov_date" required>
      </label>
      <label>Tipo
        <select name="mov_type"><option>Entrada</option><option>Saida</option><option>Perda</option></select>
      </label>
      <label>Área
        <select name="area">{% for a in areas %}<option>{{ a }}</option>{% endfor %}</select>
      </label>
      <label>Item
        <select name="item_id">{% for i in items %}<option value="{{ i.id }}">{{ i.name }} — {{ i.area }}</option>{% endfor %}</select>
      </label>
      <label>Quantidade
        <input type="number" step="0.001" name="quantity" required>
      </label>
      <label>Custo unitário (só para entrada)
        <input type="number" step="0.01" name="unit_cost">
      </label>
      <label>Detalhe
        <input type="text" name="detail">
      </label>
      <button class="btn">Salvar movimentação</button>
    </form>
  </section>
  <section class="card">
    <h3>Histórico</h3>
    <div class="table-wrap">
      <table>
        <tr><th>Data</th><th>Tipo</th><th>Área</th><th>Item</th><th>Qtd.</th><th>Valor</th></tr>
        {% for m in movimentos %}
        <tr><td>{{ m.mov_date.strftime('%d/%m/%Y') }}</td><td>{{ m.mov_type }}</td><td>{{ m.area }}</td><td>{{ m.item_name }}</td><td>{{ m.quantity }}</td><td>R$ {{ '%.2f'|format(m.value) }}</td></tr>
        {% endfor %}
      </table>
    </div>
  </section>
</div>
<script>document.querySelector('input[name="mov_date"]').value = new Date().toISOString().slice(0,10);</script>
{% endblock %}
