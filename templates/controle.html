{% extends "base.html" %}
{% block content %}

<div class="grid two">

    <section class="card">
        <h2>📝 Registro de Produção / Vendas</h2>

        <form method="post">

            <label>Data</label>
            <input type="date" name="data">

            <label style="margin-top:15px;">Grupo</label>

            <select name="grupo">
                {% for g in grupos %}
                <option value="{{ g }}">{{ g }}</option>
                {% endfor %}
            </select>

            <label style="margin-top:15px;">Nome do Item</label>
            <input type="text" name="item">

            <label style="margin-top:15px;">Produzido</label>
            <input type="number" step="0.001" name="produzido">

            <label style="margin-top:15px;">Sobra</label>
            <input type="number" step="0.001" name="sobra">

            <label style="margin-top:15px;">Vendido</label>
            <input type="number" step="0.001" name="vendido">

            <label style="margin-top:15px;">Valor Unitário</label>
            <input type="number" step="0.01" name="valor">

            <button class="btn" style="margin-top:20px; width:100%;">
                Salvar
            </button>

        </form>
    </section>

    <section class="card">

        <h2>📊 Resumo do Dia</h2>

        <table>

            <thead>
                <tr>
                    <th>Grupo</th>
                    <th>Vendido</th>
                    <th>Faturado</th>
                </tr>
            </thead>

            <tbody>

                {% for r in resumo %}

                <tr>
                    <td>{{ r.grupo }}</td>
                    <td>{{ r.vendido }}</td>
                    <td>R$ {{ r.total }}</td>
                </tr>

                {% else %}

                <tr>
                    <td colspan="3">
                        Nenhum dado hoje.
                    </td>
                </tr>

                {% endfor %}

            </tbody>

        </table>

    </section>

</div>

{% endblock %}
