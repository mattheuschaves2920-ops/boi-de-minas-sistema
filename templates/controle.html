{% extends "base.html" %}
{% block content %}
<div class="grid two">
    <section class="card">
        <h3>📝 Registro de Salgados e Bolos</h3>
        <!-- CORRIGIDO: adicionado csrf_token -->
        <form method="post" id="daily-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 10px;">
                <label>Data
                    <input type="date" name="control_date" id="control_date" required>
                </label>
                <label>Grupo
                    <select name="group_name">
                        {% for g in daily_groups %}<option value="{{ g }}">{{ g }}</option>{% endfor %}
                    </select>
                </label>
            </div>
            <label>Nome do Item
                <input type="text" name="item_name" placeholder="Ex: Coxinha..." required>
            </label>
            <div class="grid" style="grid-template-columns: repeat(3, 1fr); gap: 10px;">
                <label>Entrada
                    <input type="number" name="input_qty" id="in" min="0" value="0" required>
                </label>
                <label>Sobra
                    <input type="number" name="output_qty" id="out" min="0" value="0" required>
                </label>
                <label>Vendido
                    <input type="number" name="sold_qty" id="sold" readonly style="background:#e3f2fd">
                </label>
            </div>
            <label>Valor Unitário (R$)
                <input type="number" step="0.01" name="unit_value" placeholder="0,00">
            </label>
            <button type="submit" class="btn" style="width: 100%; margin-top: 10px;">Salvar Lançamento</button>
        </form>
    </section>

    <section class="card">
        <h3>📊 Resumo do Dia</h3>
        <div class="table-wrap">
            <table>
                <thead>
                    <tr><th>Grupo</th><th>Vendido</th><th>Faturado</th></tr>
                </thead>
                <tbody>
                    {% for g, t in totais.items() %}
                    <tr>
                        <td><strong>{{ g }}</strong></td>
                        <td>{{ t.vendido }} un.</td>
                        <td style="color:var(--green)">R$ {{ '%.2f'|format(t.faturado) }}</td>
                    </tr>
                    {% else %}
                    <tr><td colspan="3" style="text-align:center;">Nenhum dado hoje.</td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </section>
</div>

<script>
    const inQty = document.getElementById('in');
    const outQty = document.getElementById('out');
    const soldQty = document.getElementById('sold');
    function calcular() {
        const total = (parseInt(inQty.value) || 0) - (parseInt(outQty.value) || 0);
        soldQty.value = total > 0 ? total : 0;
    }
    inQty.addEventListener('input', calcular);
    outQty.addEventListener('input', calcular);
</script>
{% endblock %}
