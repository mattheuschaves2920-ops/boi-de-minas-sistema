{% extends "base.html" %}
{% block content %}
<div class="grid two">
  <section class="card">
    <h3>Registrar venda</h3>
    <form method="post">
      <label>Data<input type="date" name="sale_date" required></label>
      <label>Tipo de refeição
        <select name="meal_type">{% for t in meal_types %}<option>{{ t }}</option>{% endfor %}</select>
      </label>
      <label>Período
        <select name="period"><option>Almoço</option><option>Janta</option></select>
      </label>
      <label>Valor unitário<input type="number" step="0.01" name="unit_value" required></label>
      <label>Quantidade<input type="number" name="quantity" required></label>
      <label>Observação<input type="text" name="notes"></label>
      <button class="btn">Salvar venda</button>
    </form>
  </section>
  <section class="card">
    <h3>Últimas vendas</h3>
    <div class="table-wrap">
      <table>
        <tr><th>Data</th><th>Tipo</th><th>Período</th><th>Qtd.</th><th>Total</th></tr>
        {% for v in vendas %}
        <tr><td>{{ v.sale_date.strftime('%d/%m/%Y') }}</td><td>{{ v.meal_type }}</td><td>{{ v.period }}</td><td>{{ v.quantity }}</td><td>R$ {{ '%.2f'|format(v.unit_value * v.quantity) }}</td></tr>
        {% endfor %}
      </table>
    </div>
  </section>
</div>
<script>document.querySelector('input[name="sale_date"]').value = new Date().toISOString().slice(0,10);</script>
{% endblock %}
